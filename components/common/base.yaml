substitutions:
  board: seeed_xiao_esp32c6

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: ${board}
  variant: esp32c6
  framework:
    type: esp-idf

logger:
  baud_rate: 0

api:

ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  power_save_mode: HIGH
  fast_connect: true
  output_power: 8.5dB

captive_portal:

web_server:
  port: 80

i2c:
  sda: GPIO22
  scl: GPIO23
  scan: false

sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi RSSI"
    update_interval: never
    id: wifi_signal

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP"